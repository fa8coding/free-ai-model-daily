name: 每日免费AI Model搜索 + 微信推送（Google强过滤版）

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖并安装浏览器
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 运行爬虫并生成报告
        id: crawl
        run: python crawler.py

      - name: 自动提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Google强过滤版 - 更新每日免费Model报告"

      - name: 发送微信推送（超级调试版）
        if: always()
        continue-on-error: true
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          COUNT: ${{ steps.crawl.outputs.count }}
          REPO: ${{ github.repository }}
        run: |
          echo "=== 推送诊断开始 ==="
          if [ -z "$PUSHPLUS_TOKEN" ]; then
            echo "❌ 错误：PUSHPLUS_TOKEN 未设置！请按上方教程检查 Secrets"
            exit 0
          fi
          echo "✅ Token 已检测到（长度: ${#PUSHPLUS_TOKEN}）"

          TITLE="🤖 每日免费AI Model报告已更新 - $(date '+%Y-%m-%d')"
          CONTENT="✅ 今天共发现 **${COUNT:-0}** 条高质量免费Model！%0A%0A📄 [立即查看报告](https://github.com/${REPO}/blob/main/daily_report.md)"

          RESPONSE=$(curl -v -X POST "http://www.pushplus.plus/send" \
            -d "token=${PUSHPLUS_TOKEN}" \
            -d "title=${TITLE}" \
            -d "content=${CONTENT}" \
            -d "template=markdown" \
            -s)

          echo "📨 PushPlus 完整返回："
          echo "$RESPONSE"
          echo "=== 推送诊断结束 ==="
          echo "🎉 如果上面出现 code:200 就代表微信已收到！"
