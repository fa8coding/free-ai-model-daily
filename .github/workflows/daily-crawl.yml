name: 每日免费AI Model搜索 + 微信推送

on:
  schedule:
    - cron: '0 0 * * *'      # 每天北京时间早上 8:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install duckduckgo-search

      - name: 运行爬虫并生成报告
        id: crawl
        run: python crawler.py

      - name: 自动提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 更新每日免费Model报告"

      - name: 发送微信推送（PushPlus）
        if: always()
        continue-on-error: true          # 推送失败不影响整体成功
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          COUNT: ${{ steps.crawl.outputs.count }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PUSHPLUS_TOKEN" ]; then
            echo "⚠️ 未设置 PUSHPLUS_TOKEN，跳过推送"
            echo "（请确认已在 Settings → Secrets and variables → Actions 添加了该密钥）"
            exit 0
          fi

          echo "🚀 正在发送微信推送..."

          TITLE="🤖 每日免费AI Model报告已更新 - $(date '+%Y-%m-%d')"
          CONTENT="✅ 今天共发现 **${COUNT:-0}** 条最新免费Model使用方式！%0A%0A📄 [立即查看完整报告](https://github.com/${REPO}/blob/main/daily_report.md)%0A%0A由 GitHub Actions 自动推送"

          curl -X POST "http://www.pushplus.plus/send" \
            -d "token=${PUSHPLUS_TOKEN}" \
            -d "title=${TITLE}" \
            -d "content=${CONTENT}" \
            -d "template=markdown" \
            -s

          echo "🎉 微信推送请求已发送！"
